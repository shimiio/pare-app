name: Frontend CI

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Clone the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Install pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # Install Dependencies
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Build the project
      - name: Build
        working-directory: frontend
        run: pnpm build
        env:
          VITE_CURRENCY_RATES_API_KEY: ${{ secrets.VITE_CURRENCY_RATES_API_KEY }}
