services:
  db:
    ports:
      - "5432:5432"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Email__Provider: smtp
      Email__Host: mailpit
      Email__Port: "1025"

  mailpit:
    image: axllent/mailpit:latest
    container_name: pare-mailpit
    ports:
      - "8025:8025"
