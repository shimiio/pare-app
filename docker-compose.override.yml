services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Email__Provider: smtp
      Email__Host: mailpit
      Email__Port: "1025"
    ports:
      - "8080:8080"

  mailpit:
    image: axllent/mailpit:latest
    container_name: pare-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
