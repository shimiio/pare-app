services:
  db:
    image: postgres:16
    container_name: pare-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pare-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      MediatR__LicenseKey: ${MEDIATR_LICENSE_KEY}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_CURRENCY_RATES_API_KEY: ${VITE_CURRENCY_RATES_API_KEY}
    container_name: pare-frontend
    depends_on:
      - api

volumes:
  postgres_data:
